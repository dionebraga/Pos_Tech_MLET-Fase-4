global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'lstm-api-monitor'

scrape_configs:
  # API LSTM em produção (Render)
  - job_name: 'lstm-api-prod'
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ['pos-tech-mlet-fase-4.onrender.com']
        labels:
          service: 'lstm-stock-api'
          env: 'production'

  # API LSTM local — uvicorn no host (docker-compose ou direto)
  - job_name: 'lstm-api-local'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'lstm-stock-api'
          env: 'local'

  # Self-monitoring do Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
