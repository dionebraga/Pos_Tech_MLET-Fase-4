global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'lstm-api-monitor'

scrape_configs:
  # Métricas da própria API LSTM
  - job_name: 'lstm-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'lstm-stock-api'

  # Self-monitoring do Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
