[server]
headless = true
enableCORS = false
enableXsrfProtection = false
port = 8501

[theme]
base = "dark"
backgroundColor = "#050507"
secondaryBackgroundColor = "#0A0A0E"
textColor = "#FAFAFA"
font = "monospace"

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[logger]
level = "warning"
